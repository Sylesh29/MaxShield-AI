<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaxShield AI — Autonomous Claim Scrubbing</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.35s ease-out',
          },
          keyframes: {
            fadeIn:  { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Inter', sans-serif; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }

    /* Gauge */
    .gauge-path { transition: stroke-dashoffset 1.4s cubic-bezier(0.34, 1.2, 0.64, 1); }

    /* Agent pulse */
    @keyframes agentPulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(56,189,248,.6); } 50%{ box-shadow: 0 0 0 8px rgba(56,189,248,0); } }
    .agent-running { animation: agentPulse 1.4s ease-in-out infinite; }

    /* Parallel bracket */
    .parallel-bracket::before {
      content: '';
      position: absolute;
      left: -16px; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, #0ea5e9, #06b6d4);
      border-radius: 99px;
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Card hover */
    .hover-card { transition: border-color .2s, box-shadow .2s; }
    .hover-card:hover { border-color: #334155; box-shadow: 0 0 0 1px #1e293b; }

    /* Risk badge */
    .risk-low    { background: #14532d22; color: #4ade80; border-color: #16a34a44; }
    .risk-medium { background: #78350f22; color: #fbbf24; border-color: #d9770044; }
    .risk-high   { background: #7f1d1d22; color: #f87171; border-color: #dc262644; }
  </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen antialiased overflow-hidden"
      x-data="maxshield()" x-cloak>

<!-- ══════════════════════  HEADER  ══════════════════════ -->
<header class="h-14 border-b border-slate-800/80 px-6 flex items-center justify-between bg-slate-900/90 backdrop-blur-sm sticky top-0 z-20">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center shadow-lg shadow-sky-500/25">
      <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.955 11.955 0 01 3 10c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.25-8.25-3.286z"/>
      </svg>
    </div>
    <div class="flex items-baseline gap-2">
      <span class="font-bold text-white text-lg tracking-tight">MaxShield AI</span>
      <span class="text-slate-500 text-sm hidden sm:inline">Autonomous Medical Claim Scrubbing</span>
    </div>
  </div>

  <div class="flex items-center gap-2.5">
    <!-- W&B badge -->
    <span class="hidden md:flex items-center gap-1.5 text-[11px] font-semibold px-2.5 py-1 rounded-full border"
          style="background:#FFBE0012;color:#FFBE00;border-color:#FFBE0030;">
      <span class="w-2 h-2 rounded-full inline-block" style="background:#FFBE00;"></span>
      W&amp;B Weave
    </span>
    <!-- Claude badge -->
    <span class="hidden md:flex items-center gap-1.5 text-[11px] font-semibold px-2.5 py-1 rounded-full border bg-orange-500/10 text-orange-400 border-orange-500/25">
      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
      Claude Sonnet 4.6
    </span>
    <!-- LangGraph badge -->
    <span class="hidden md:flex items-center gap-1.5 text-[11px] font-semibold px-2.5 py-1 rounded-full border bg-violet-500/10 text-violet-400 border-violet-500/25">
      LangGraph
    </span>
    <!-- Live indicator -->
    <div class="flex items-center gap-1.5 ml-1">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
      <span class="text-[11px] text-slate-400 font-medium">API Online</span>
    </div>
  </div>
</header>

<!-- ══════════════════════  MAIN GRID  ══════════════════════ -->
<main class="grid grid-cols-1 lg:grid-cols-[420px_1fr] h-[calc(100vh-56px)] overflow-hidden">

  <!-- ═══════  LEFT PANEL — CLAIM INPUT  ═══════ -->
  <aside class="border-r border-slate-800/80 overflow-y-auto bg-slate-900/40 flex flex-col">
    <div class="p-5 space-y-4 flex-1">

      <!-- Mock demo CTA -->
      <button id="load-demo-btn" @click="loadMockDemo()" onclick="Alpine.$data(this.closest('[x-data]')).loadMockDemo()"
              :class="loadingDemo ? 'opacity-60 cursor-wait' : 'hover:shadow-sky-500/30 hover:shadow-lg'"
              class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 text-white font-semibold rounded-xl px-4 py-3 flex items-center justify-center gap-2 transition-all duration-200 shadow-md">
        <template x-if="!loadingDemo">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15a2.25 2.25 0 01.45 2.295l-1.5 3.75a2.25 2.25 0 01-2.087 1.41H7.337a2.25 2.25 0 01-2.087-1.41l-1.5-3.75A2.25 2.25 0 014.2 15"/></svg>
        </template>
        <template x-if="loadingDemo">
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </template>
        <span x-text="loadingDemo ? 'Loading...' : 'Load Mock Demo — Knee Injection'"></span>
      </button>

      <!-- Intentional flaw alert (shows after demo load) -->
      <template x-if="demoLoaded">
        <div class="animate-fade-in flex items-start gap-2.5 bg-amber-500/10 border border-amber-500/30 rounded-xl p-3 text-sm">
          <svg class="w-4 h-4 text-amber-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
          <div>
            <span class="font-semibold text-amber-400 block">Intentional Flaw Loaded</span>
            <span class="text-amber-300/80">CPT 99214 + 20610 missing Modifier 25 — watch MaxShield AI catch it</span>
          </div>
        </div>
      </template>

      <!-- Payer selector -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1.5">Insurance Carrier</label>
        <div class="grid grid-cols-3 gap-1.5">
          <template x-for="payer in payers" :key="payer">
            <button @click="payerName = payer"
                    :class="payerName === payer ? 'bg-sky-600/30 border-sky-500 text-sky-300' : 'border-slate-700 text-slate-400 hover:border-slate-600 hover:text-slate-300'"
                    class="border rounded-lg px-2 py-1.5 text-xs font-medium transition-all"
                    x-text="payer"></button>
          </template>
        </div>
      </div>

      <!-- Provider ID -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1.5">Provider NPI</label>
        <input x-model="providerID" type="text" placeholder="NPI-1234567890"
               class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/30 transition-colors" />
      </div>

      <!-- Clinical note -->
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Clinical Documentation</label>
          <span class="text-[11px] text-slate-500" x-text="clinicalNote.length + ' chars'"></span>
        </div>
        <textarea x-model="clinicalNote" rows="8" placeholder="Paste physician encounter note here..."
                  class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/30 transition-colors resize-none font-mono leading-relaxed"></textarea>
      </div>

      <!-- Proposed codes -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Proposed Billing Codes</label>
          <button @click="addCode()"
                  class="text-xs text-sky-400 hover:text-sky-300 flex items-center gap-1 font-medium transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Add Code
          </button>
        </div>
        <div class="space-y-2">
          <template x-for="(c, i) in codes" :key="i">
            <div class="flex items-center gap-2 animate-fade-in">
              <input x-model="c.code" type="text" placeholder="99214"
                     class="w-24 bg-slate-800/60 border border-slate-700 rounded-lg px-2.5 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-sky-500 font-mono" />
              <select x-model="c.code_type"
                      class="bg-slate-800/60 border border-slate-700 rounded-lg px-2.5 py-2 text-sm text-slate-200 focus:outline-none focus:border-sky-500">
                <option value="CPT">CPT</option>
                <option value="ICD-10-CM">ICD-10</option>
              </select>
              <input x-model="c.description" type="text" placeholder="Description"
                     class="flex-1 bg-slate-800/60 border border-slate-700 rounded-lg px-2.5 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
              <input x-model="c.modifiers_raw" type="text" placeholder="25"
                     title="Modifiers (comma-separated)"
                     class="w-14 bg-slate-800/60 border border-slate-700 rounded-lg px-2 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-sky-500 text-center font-mono" />
              <button @click="codes.splice(i,1)"
                      class="text-slate-600 hover:text-red-400 transition-colors shrink-0">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </template>
          <template x-if="codes.length === 0">
            <p class="text-xs text-slate-600 text-center py-3 border border-dashed border-slate-800 rounded-xl">No codes yet — load demo or add manually</p>
          </template>
        </div>
      </div>

    </div><!-- /scroll area -->

    <!-- Sticky action buttons -->
    <div class="sticky bottom-0 p-4 bg-slate-900/95 backdrop-blur border-t border-slate-800/80 space-y-2">
      <!-- Error message -->
      <template x-if="errorMsg">
        <div class="animate-fade-in flex items-center gap-2 bg-red-500/10 border border-red-500/30 rounded-xl px-3 py-2 text-sm text-red-400">
          <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
          <span x-text="errorMsg" class="truncate"></span>
        </div>
      </template>

      <div class="grid grid-cols-2 gap-2">
        <!-- Stream Live -->
        <button @click="streamClaim()"
                :disabled="phase==='streaming' || phase==='running'"
                :class="(phase==='streaming'||phase==='running') ? 'opacity-50 cursor-wait' : 'hover:bg-sky-500/20 hover:border-sky-400'"
                class="flex items-center justify-center gap-2 border border-sky-500/50 text-sky-400 font-semibold rounded-xl px-4 py-2.5 text-sm transition-all duration-200">
          <template x-if="phase!=='streaming'">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
          </template>
          <template x-if="phase==='streaming'">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          </template>
          <span x-text="phase==='streaming' ? 'Streaming...' : 'Stream Live'"></span>
        </button>

        <!-- Scrub Claim -->
        <button @click="scrubClaim()"
                :disabled="phase==='streaming' || phase==='running'"
                :class="(phase==='streaming'||phase==='running') ? 'opacity-50 cursor-wait' : 'hover:from-sky-500 hover:to-indigo-500 hover:shadow-sky-500/25 hover:shadow-lg'"
                class="flex items-center justify-center gap-2 bg-gradient-to-r from-sky-600 to-indigo-600 text-white font-semibold rounded-xl px-4 py-2.5 text-sm transition-all duration-200 shadow-md">
          <template x-if="phase!=='running'">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
          </template>
          <template x-if="phase==='running'">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          </template>
          <span x-text="phase==='running' ? 'Scrubbing...' : 'Scrub Claim'"></span>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══════  RIGHT PANEL — PIPELINE + RESULTS  ═══════ -->
  <div class="overflow-y-auto p-5 space-y-5 bg-slate-950">

    <!-- ── Agent Pipeline ── -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
          <span class="w-1.5 h-4 rounded-full bg-sky-400 inline-block"></span>
          Multi-Agent Pipeline
        </h2>
        <template x-if="report">
          <span class="text-[11px] text-slate-500 flex items-center gap-1.5">
            <span x-text="report.pipeline_agents_run ? report.pipeline_agents_run.length + ' agents ran' : ''"></span>
            <template x-if="report.deep_audit_triggered">
              <span class="bg-violet-500/20 text-violet-400 border border-violet-500/30 px-2 py-0.5 rounded-full text-[11px] font-semibold">4-agent path</span>
            </template>
          </span>
        </template>
      </div>

      <div class="space-y-2.5">
        <!-- Parallel label -->
        <div class="flex items-center gap-2 mb-0.5">
          <span class="text-[10px] text-sky-400 font-semibold uppercase tracking-widest">Parallel Fan-Out</span>
          <div class="flex-1 h-px bg-sky-400/20"></div>
        </div>

        <!-- Agent nodes -->
        <template x-for="agent in agentNodes" :key="agent.id">
          <div :class="{
                 'ml-4 relative parallel-bracket': agent.parallel,
                 'animate-slide-up': agent.status !== 'pending',
               }"
               class="flex items-start gap-3 bg-slate-900/60 border border-slate-800 hover-card rounded-xl p-3.5">

            <!-- Status icon -->
            <div class="shrink-0 mt-0.5">
              <!-- Pending -->
              <template x-if="agent.status === 'pending'">
                <div class="w-8 h-8 rounded-full border-2 border-slate-700 flex items-center justify-center">
                  <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                </div>
              </template>
              <!-- Running -->
              <template x-if="agent.status === 'running'">
                <div class="w-8 h-8 rounded-full border-2 border-sky-400 bg-sky-400/10 flex items-center justify-center agent-running">
                  <svg class="w-3.5 h-3.5 text-sky-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                </div>
              </template>
              <!-- Complete -->
              <template x-if="agent.status === 'complete'">
                <div class="w-8 h-8 rounded-full border-2 border-emerald-500 bg-emerald-500/10 flex items-center justify-center">
                  <svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                </div>
              </template>
              <!-- Skipped -->
              <template x-if="agent.status === 'skipped'">
                <div class="w-8 h-8 rounded-full border-2 border-slate-700 bg-slate-800/50 flex items-center justify-center">
                  <svg class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"/></svg>
                </div>
              </template>
            </div>

            <!-- Agent info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-sm text-slate-200" x-text="agent.label"></span>
                <!-- Parallel badge -->
                <template x-if="agent.parallel">
                  <span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-500/20 px-1.5 py-0.5 rounded font-semibold">PARALLEL</span>
                </template>
                <!-- Conditional badge -->
                <template x-if="agent.conditional">
                  <span class="text-[10px] bg-violet-500/10 text-violet-400 border border-violet-500/20 px-1.5 py-0.5 rounded font-semibold">CONDITIONAL</span>
                </template>
                <!-- Router badge -->
                <template x-if="agent.isRouter">
                  <span class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-1.5 py-0.5 rounded font-semibold">FAN-IN</span>
                </template>
              </div>
              <p class="text-xs text-slate-500 mt-0.5" x-text="agent.subtitle"></p>

              <!-- Completion details -->
              <template x-if="agent.status === 'complete' && agent.riskScore !== null">
                <div class="mt-2 flex items-center gap-3 flex-wrap">
                  <div class="flex items-center gap-1.5">
                    <span class="text-[11px] text-slate-500">Risk</span>
                    <span :class="riskBadgeClass(agent.riskScore)"
                          class="text-[11px] font-bold px-2 py-0.5 rounded-full border"
                          x-text="Math.round(agent.riskScore * 100) + '%'"></span>
                  </div>
                  <template x-if="agent.flawsFound !== null">
                    <div class="flex items-center gap-1.5">
                      <span class="text-[11px] text-slate-500">Flaws</span>
                      <span :class="agent.flawsFound > 0 ? 'text-amber-400' : 'text-emerald-400'"
                            class="text-[11px] font-bold" x-text="agent.flawsFound"></span>
                    </div>
                  </template>
                  <template x-if="agent.approvalStatus">
                    <span :class="{
                            'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': agent.approvalStatus === 'APPROVED',
                            'bg-amber-500/10 text-amber-400 border-amber-500/20': agent.approvalStatus === 'FLAGGED',
                            'bg-red-500/10 text-red-400 border-red-500/20': agent.approvalStatus === 'REJECTED',
                          }"
                          class="text-[10px] font-bold px-2 py-0.5 rounded border"
                          x-text="agent.approvalStatus"></span>
                  </template>
                </div>
              </template>
              <!-- Triage router result -->
              <template x-if="agent.isRouter && agent.status === 'complete' && agent.routingDecision">
                <div class="mt-2 flex items-center gap-2">
                  <span class="text-[11px] text-slate-500">Routed to</span>
                  <span :class="agent.routingDecision === 'deep_audit' ? 'bg-violet-500/10 text-violet-400 border-violet-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'"
                        class="text-[11px] font-bold px-2 py-0.5 rounded border"
                        x-text="agent.routingDecision === 'deep_audit' ? 'Deep Audit (high risk)' : 'Denial Predictor (low risk)'"></span>

            <!-- Elapsed time -->

        <!-- Fan-in label -->

    </section>

    <!-- ── SSE Live Log ── -->
    <template x-if="streamLog.length > 0 || phase==='streaming'">

        <h2 class="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2 mb-3">

          Live Event Stream
          <template x-if="phase==='streaming'">
            <span class="flex items-center gap-1 text-sky-400 text-[11px] font-normal">

              streaming
            </span>
          </template>
        </h2>
        <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-3 space-y-1.5 max-h-40 overflow-y-auto sse-log font-mono text-xs">

                      'text-sky-400': ev.event === 'done',
                      'text-red-400': ev.event === 'error',
                    }" x-text="ev.event === 'node_complete' ? `[${ev.node}] completed` + (ev.risk_score != null ? ` — risk ${Math.round(ev.risk_score*100)}%` : '') : `[${ev.event}]`"></span>

          <template x-if="phase==='streaming'">
            <div class="flex items-center gap-1 text-sky-400">

        </div>

    </template>

    <!-- ── RESULTS ── -->
    <template x-if="report">
      <div class="space-y-5 animate-slide-up">

        <!-- Denial Risk + Financial Impact (hero row) -->
        <section class="grid grid-cols-1 sm:grid-cols-2 gap-4">

          <!-- Denial Probability Gauge -->
          <div class="bg-slate-900/70 border border-slate-800 rounded-2xl p-5 flex flex-col items-center hover-card">

<!-- ══════════════════════  ALPINE STORE  ══════════════════════ -->
<script>
function maxshield() {
  return {
    // ── Form state ──
    clinicalNote: '',
    providerID:   'NPI-1234567890',
    payerName:    'Aetna',
    payers: ['Aetna', 'UnitedHealthcare', 'BlueCross BlueShield', 'Cigna', 'Medicare'],
    codes: [],
    demoLoaded: false,
    loadingDemo: false,

    // ── Pipeline ──
    phase: 'idle',  // idle | running | streaming | complete | error
    agentNodes: [
      { id: 'clinical_validator', label: 'Clinical Validator',       subtitle: 'Documentation sufficiency vs code complexity',         parallel: true,  isRouter: false, conditional: false, status: 'pending', riskScore: null, flawsFound: null, approvalStatus: null, routingDecision: null, elapsed: null },
      { id: 'payer_compliance',   label: 'Payer Compliance',          subtitle: 'Carrier-specific policy & modifier requirements',      parallel: true,  isRouter: false, conditional: false, status: 'pending', riskScore: null, flawsFound: null, approvalStatus: null, routingDecision: null, elapsed: null },
      { id: 'triage_router',      label: 'Triage Router',             subtitle: 'Deterministic fan-in · routes on risk > 75%',          parallel: false, isRouter: true,  conditional: false, status: 'pending', riskScore: null, flawsFound: null, approvalStatus: null, routingDecision: null, elapsed: null },
      { id: 'deep_audit',         label: 'Deep Audit Agent',          subtitle: 'Line-by-line code analysis (high-risk path only)',     parallel: false, isRouter: false, conditional: true,  status: 'pending', riskScore: null, flawsFound: null, approvalStatus: null, routingDecision: null, elapsed: null },
      { id: 'denial_predictor',   label: 'Denial Predictor',          subtitle: 'NCCI deterministic check · final report synthesis',   parallel: false, isRouter: false, conditional: false, status: 'pending', riskScore: null, flawsFound: null, approvalStatus: null, routingDecision: null, elapsed: null },
    ],
    streamLog: [],
    report: null,
    errorMsg: '',
    _nodeStartTimes: {},

    // ── Actions ──
    async loadMockDemo() {
      this.loadingDemo = true;
      try {
        const res = await fetch('/api/v1/mock-demo');
        const data = await res.json();
        const p = data.claim_payload;
        this.clinicalNote = p.clinical_note.raw_text;
        this.providerID   = p.clinical_note.provider_id;
        this.payerName    = p.clinical_note.payer_name;
        this.codes = p.proposed_codes.map(c => ({
          code: c.code,
          code_type: c.code_type,
          description: c.description,
          modifiers_raw: (c.modifiers || []).join(','),
        }));
        this.demoLoaded = true;
        this.report = null;
        this.streamLog = [];
        this.resetAgents();
      } catch(e) {
        this.errorMsg = 'Failed to load mock demo: ' + e.message;
      } finally {
        this.loadingDemo = false;
      }
    },

    addCode() {
      this.codes.push({ code: '', code_type: 'CPT', description: '', modifiers_raw: '' });
    },

    buildPayload() {
      return {
        clinical_note: {
          raw_text:    this.clinicalNote,
          provider_id: this.providerID,
          payer_name:  this.payerName,
        },
        proposed_codes: this.codes.map(c => ({
          code:        c.code.trim().toUpperCase(),
          code_type:   c.code_type,
          description: c.description,
          modifiers:   c.modifiers_raw ? c.modifiers_raw.split(',').map(m=>m.trim()).filter(Boolean) : [],
        })),
      };
    },

    resetAgents() {
      this.agentNodes.forEach(a => {
        a.status = 'pending';
        a.riskScore = null;
        a.flawsFound = null;
        a.approvalStatus = null;
        a.routingDecision = null;
        a.elapsed = null;
      });
      this._nodeStartTimes = {};
    },

    // Full pipeline call (no streaming)
    async scrubClaim() {
      if (!this.clinicalNote || !this.codes.length) {
        this.errorMsg = 'Please load the demo or fill in a clinical note and codes first.';
        return;
      }
      this.errorMsg = '';
      this.report = null;
      this.streamLog = [];
      this.phase = 'running';
      this.resetAgents();
      // Mark all non-conditional agents as running (best-effort UX)
      this.agentNodes.forEach(a => { if (!a.conditional) a.status = 'running'; });

      try {
        const res = await fetch('/api/v1/scrub-claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.buildPayload()),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        this.applyReport(data);
        this.phase = 'complete';
      } catch(e) {
        this.errorMsg = e.message;
        this.phase = 'error';
        this.agentNodes.forEach(a => { if (a.status === 'running') a.status = 'pending'; });
      }
    },

    // SSE streaming call
    async streamClaim() {
      if (!this.clinicalNote || !this.codes.length) {
        this.errorMsg = 'Please load the demo or fill in a clinical note and codes first.';
        return;
      }
      this.errorMsg = '';
      this.report = null;
      this.streamLog = [];
      this.phase = 'streaming';
      this.resetAgents();
      // Mark the two parallel agents as "running" upfront (they fire simultaneously)
      ['clinical_validator','payer_compliance'].forEach(id => {
        const n = this.agentNodes.find(a => a.id === id);
        if (n) { n.status = 'running'; this._nodeStartTimes[id] = Date.now(); }
      });

      try {
        const res = await fetch('/api/v1/scrub-claim/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.buildPayload()),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try { this.handleSSEEvent(JSON.parse(line.slice(6))); } catch(_) {}
            }
          }
        }
        this.phase = 'complete';
      } catch(e) {
        this.errorMsg = e.message;
        this.phase = 'error';
        this.agentNodes.forEach(a => { if (a.status === 'running') a.status = 'pending'; });
      }
    },

    handleSSEEvent(ev) {
      const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      this.streamLog.push({ ...ev, ts });

      if (ev.event === 'node_complete') {
        const node = this.agentNodes.find(a => a.id === ev.node);
        if (node) {
          const start = this._nodeStartTimes[ev.node] || Date.now();
          node.elapsed = ((Date.now() - start) / 1000).toFixed(1);
          node.status = 'complete';
          if (ev.risk_score != null) node.riskScore = ev.risk_score;
          if (ev.flaws_found != null) node.flawsFound = ev.flaws_found;
          if (ev.approval_status) node.approvalStatus = ev.approval_status;
        }
        // After triage completes, mark appropriate next nodes as running/skipped
        if (ev.node === 'triage_router') {
          const triage = this.agentNodes.find(a => a.id === 'triage_router');
          // Use the explicit routing_decision field sent by the backend (C1 fix).
          // The old agents_run_so_far > 2 check was always false at triage time.
          const deepAuditTrigger = ev.routing_decision === 'deep_audit';
          if (triage) triage.routingDecision = ev.routing_decision || 'denial_predictor';
          const deepNode = this.agentNodes.find(a => a.id === 'deep_audit');
          const predNode = this.agentNodes.find(a => a.id === 'denial_predictor');
          if (deepAuditTrigger) {
            if (deepNode) { deepNode.status = 'running'; this._nodeStartTimes['deep_audit'] = Date.now(); }
          } else {
            if (deepNode) deepNode.status = 'skipped';
            if (predNode) { predNode.status = 'running'; this._nodeStartTimes['denial_predictor'] = Date.now(); }
          }
        }
        if (ev.node === 'deep_audit') {
          const predNode = this.agentNodes.find(a => a.id === 'denial_predictor');
          if (predNode) { predNode.status = 'running'; this._nodeStartTimes['denial_predictor'] = Date.now(); }
        }
        if (ev.node === 'payer_compliance' || ev.node === 'clinical_validator') {
          const triageNode = this.agentNodes.find(a => a.id === 'triage_router');
          const bothDone = ['clinical_validator','payer_compliance'].every(id => {
            const n = this.agentNodes.find(a => a.id === id);
            return n && n.status === 'complete';
          });
          if (bothDone && triageNode && triageNode.status === 'pending') {
            triageNode.status = 'running';
            this._nodeStartTimes['triage_router'] = Date.now();
          }
        }
      }

      if (ev.event === 'done' && ev.final_report) {
        this.applyReport(ev.final_report);
      }
    },

    applyReport(data) {
      this.report = data;
      // Mark all agents as complete if report is available
      this.agentNodes.forEach(a => {
        if (a.status === 'running') a.status = 'complete';
        if (a.status === 'pending' && !a.conditional) a.status = 'complete';
      });
      // Sync triage routing from report
      const triageNode = this.agentNodes.find(a => a.id === 'triage_router');
      if (triageNode && data.deep_audit_triggered != null) {
        triageNode.routingDecision = data.deep_audit_triggered ? 'deep_audit' : 'denial_predictor';
        triageNode.status = 'complete';
      }
      if (data.deep_audit_triggered === false) {
        const deepNode = this.agentNodes.find(a => a.id === 'deep_audit');
        if (deepNode && deepNode.status !== 'complete') deepNode.status = 'skipped';
      }
      // Apply risk scores from agent assessments
      if (data.agent_assessments) {
        data.agent_assessments.forEach(a => {
          // Strip trailing _Agent/_agent suffix so "Clinical_Validator_Agent" matches node id "clinical_validator" (C2 fix)
          const normalised = a.agent_name?.toLowerCase().replace(/_agent$/i, '').replace(/ /g, '_');
          const target = this.agentNodes.find(n => n.id === normalised);
          if (target) {
            target.riskScore = a.risk_score;
            target.flawsFound = (a.identified_flaws || []).length;
            target.approvalStatus = a.approval_status;
            target.status = 'complete';
          }
        });
      }
    },

    // Returns the optimized version of a given original code
    getOptimizedCode(code, index) {
      if (!this.report?.optimized_claim_payload?.proposed_codes) return null;
      const opt = this.report.optimized_claim_payload.proposed_codes;
      // Try match by code first, then by index
      return opt.find(c => c.code === code.toUpperCase()) || opt[index] || null;
    },

    // ── Gauge helpers ──
    gaugeColor(score) {
      if (score < 30)  return '#4ade80';
      if (score < 60)  return '#fbbf24';
      return '#f87171';
    },
    gaugeDash(score) {
      const total = 251.3;
      const filled = total * (score / 100);
      return `${filled} ${total}`;
    },

    // Risk badge class
    riskBadgeClass(score) {
      if (score == null) return 'bg-slate-700 text-slate-400 border-slate-600';
      const pct = score > 1 ? score : score * 100;
      if (pct < 30)  return 'risk-low';
      if (pct < 70)  return 'risk-medium';
      return 'risk-high';
    },
  };
}
</script>
